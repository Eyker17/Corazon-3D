<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para Ti ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050005;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        #instrucciones {
            position: absolute;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            width: 100%;
            z-index: 10;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.7; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>
    <div id="instrucciones">Desliza la pantalla para girar el corazón ❤️</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- OPTIMIZACIÓN: CACHE DE TEXTOS (OFFSCREEN CANVASES) ---
        // Actualizado con los mensajes personalizados
        const phrases = ["Te amo Carolina", "Te quiero mucho Geo"];
        const colors = ["#ff2a6d", "#ff62a5", "#ffb3d1", "#ffffff"];
        const textCaches = [];

        phrases.forEach(phrase => {
            colors.forEach(color => {
                const offscreen = document.createElement('canvas');
                const oCtx = offscreen.getContext('2d');
                
                // Reducimos un poco el tamaño base de 32px a 24px porque las frases son más largas
                oCtx.font = "bold 24px Arial";
                const metrics = oCtx.measureText(phrase);
                
                offscreen.width = Math.ceil(metrics.width) + 10;
                offscreen.height = 36;
                
                oCtx.font = "bold 24px Arial";
                oCtx.fillStyle = color;
                oCtx.textBaseline = "middle";
                oCtx.textAlign = "center";
                oCtx.fillText(phrase, offscreen.width / 2, offscreen.height / 2);
                
                textCaches.push({
                    canvas: offscreen,
                    width: offscreen.width,
                    height: offscreen.height,
                    phrase: phrase
                });
            });
        });

        const totalParticles = 1000;
        const particles = [];
        
        let angleX = 0;
        let angleY = 0.5; 
        let targetAngleX = 0;
        let targetAngleY = 0.5;

        let morphProgress = 0;
        const morphSpeed = 0.003; 

        let isDragging = false;
        let previousX = 0;
        let previousY = 0;

        for (let i = 0; i < totalParticles; i++) {
            const t = Math.random() * Math.PI * 2;
            const phi = (Math.random() - 0.5) * Math.PI;
            const r = Math.cos(phi);

            let tx = 16 * Math.pow(Math.sin(t), 3) * r;
            let ty = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * r;
            let tz = 15 * Math.sin(phi);

            const scale = Math.min(canvas.width, canvas.height) * 0.022;
            tx *= scale;
            ty *= -scale;
            tz *= scale;

            const sx = (Math.random() - 0.5) * canvas.width * 1.8;
            const sy = (Math.random() - 0.5) * canvas.height * 1.8;
            const sz = (Math.random() - 0.5) * 400;

            // Selección de los nuevos mensajes
            const selectedPhrase = i % 2 === 0 ? "Te amo Carolina" : "Te quiero mucho Geo";
            
            const validCaches = textCaches.filter(c => c.phrase === selectedPhrase);
            const myCache = validCaches[Math.floor(Math.random() * validCaches.length)];

            particles.push({
                sx, sy, sz,
                tx, ty, tz,
                cache: myCache,
                sizeModifier: 0.35 + Math.random() * 0.25 
            });
        }

        function startDrag(x, y) { isDragging = true; previousX = x; previousY = y; }
        function moveDrag(x, y) {
            if (!isDragging) return;
            targetAngleY += (x - previousX) * 0.007;
            targetAngleX += (y - previousY) * 0.007;
            previousX = x; previousY = y;
        }
        function endDrag() { isDragging = false; }

        window.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', (e) => moveDrag(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', endDrag);
        window.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', endDrag);

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (morphProgress < 1) morphProgress += morphSpeed;
            if (!isDragging) targetAngleY += 0.003; 

            angleX += (targetAngleX - angleX) * 0.05;
            angleY += (targetAngleY - angleY) * 0.05;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const perspective = 500;

            for (let i = 0; i < totalParticles; i++) {
                const p = particles[i];

                const cx = p.sx + (p.tx - p.sx) * morphProgress;
                const cy = p.sy + (p.ty - p.sy) * morphProgress;
                const cz = p.sz + (p.tz - p.sz) * morphProgress;

                let x1 = cx * Math.cos(angleY) - cz * Math.sin(angleY);
                let z1 = cx * Math.sin(angleY) + cz * Math.cos(angleY);

                let y2 = cy * Math.cos(angleX) - z1 * Math.sin(angleX);
                let z2 = cy * Math.sin(angleX) + z1 * Math.cos(angleX);

                if (z2 < -perspective) continue;

                const pScale = perspective / (perspective + z2);
                const screenX = centerX + x1 * pScale;
                const screenY = centerY + y2 * pScale;

                const finalScale = p.sizeModifier * pScale;
                const w = p.cache.width * finalScale;
                const h = p.cache.height * finalScale;

                ctx.globalAlpha = Math.min(1, Math.max(0.1, (perspective - z2) / (perspective * 1.3)));
                ctx.drawImage(p.cache.canvas, screenX - w / 2, screenY - h / 2, w, h);
            }

            ctx.globalAlpha = 1.0;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
