<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para Ti ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010001; /* Fondo ligeramente más oscuro para mayor contraste */
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        #instrucciones {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            width: 100%;
            z-index: 10;
            animation: pulse 2s infinite;
            letter-spacing: 1px;
        }
        @keyframes pulse {
            0% { opacity: 0.2; transform: translateY(0); }
            50% { opacity: 0.6; transform: translateY(-5px); }
            100% { opacity: 0.2; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>
    <div id="instrucciones">Desliza para girar ❤️</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Regenerar partículas en resize para recalcular la escala
            if (particles.length > 0) initHeartPoints(); 
        }
        window.addEventListener('resize', resizeCanvas);

        // --- OPTIMIZACIÓN: CACHE DE TEXTOS CON EFECTO NEÓN GLOW ---
        const phrases = ["Te amo Carolina", "Te quiero mucho Geo"];
        const baseColors = ["#ff2a6d", "#ff62a5", "#ffffff"]; // Neon pinks y blanco
        const textCaches = [];
        const baseFontSize = 24;

        phrases.forEach(phrase => {
            baseColors.forEach(color => {
                const offscreen = document.createElement('canvas');
                const oCtx = offscreen.getContext('2d');
                
                // Medir texto
                oCtx.font = `bold ${baseFontSize}px Arial`;
                const metrics = oCtx.measureText(phrase);
                
                // Dimensiones del canvas auxiliar (con espacio para el glow)
                const glowSpread = 12; // Cuanto se extiende el neón
                offscreen.width = Math.ceil(metrics.width) + (glowSpread * 2);
                offscreen.height = baseFontSize + (glowSpread * 2);
                
                // Configuración de dibujo en offscreen
                oCtx.textBaseline = "middle";
                oCtx.textAlign = "center";
                oCtx.font = `bold ${baseFontSize}px Arial`;
                
                // --- INSERCIÓN DEL EFECTO GLOW (Pre-renderizado) ---
                oCtx.shadowColor = color;
                oCtx.shadowBlur = glowSpread;
                oCtx.fillStyle = color;
                oCtx.fillText(phrase, offscreen.width / 2, offscreen.height / 2);
                
                // Dibujamos el texto una segunda vez encima (blanco o color base)
                // para que el núcleo del texto sea brillante y legible
                oCtx.shadowBlur = 0; // Desactivar glow para la capa superior
                oCtx.fillStyle = "#ffffff"; // O utilizar 'color' si prefieres núcleos de color
                oCtx.fillText(phrase, offscreen.width / 2, offscreen.height / 2);
                
                textCaches.push({
                    canvas: offscreen,
                    width: offscreen.width,
                    height: offscreen.height,
                    phrase: phrase
                });
            });
        });

        // --- CONFIGURACIÓN DE PARTÍCULAS ---
        const totalParticles = 1200; // Un poco más para mayor densidad
        let particles = [];
        
        // Rotación y control
        let angleX = 0;
        let angleY = 0.5; 
        let targetAngleX = 0;
        let targetAngleY = 0.5;

        // Morphing (el inicio disperso)
        let morphProgress = 0;
        const morphSpeed = 0.003; 

        // Touch/Mouse controls
        let isDragging = false;
        let previousX = 0;
        let previousY = 0;

        // --- NUEVA GEOMETRÍA 3D (Corazón Puffy/Volumétrico) ---
        function initHeartPoints() {
            particles = [];
            // Determinar la escala base según la pantalla (móvil vs pc)
            const minDim = Math.min(canvas.width, canvas.height);
            const scale = minDim * 0.024; 

            for (let i = 0; i < totalParticles; i++) {
                // 1. Base del corazón en 2D (Fórmula Cardioide estándar t)
                // Usamos random t para distribuir uniformemente por el contorno
                const t = Math.random() * Math.PI * 2;
                let tx = 16 * Math.pow(Math.sin(t), 3);
                let ty = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                
                // 2. Generar volumen (Puffiness)
                // 'v' define la profundidad y el redondeo de los bordes.
                const v = (Math.random() - 0.5) * 2; // -1 a 1

                // Esta es la clave para que no se vea plano: redondeamos los bordes
                const roundingFactor = Math.sqrt(Math.max(0, 1 - Math.pow(v, 2)));
                
                // Escala de profundidad (grosor)
                const thickness = 10; 

                // Aplicamos el redondeo a X e Y basándonos en la Z
                tx *= (0.8 + 0.2 * roundingFactor);
                ty *= (0.8 + 0.2 * roundingFactor);
                let tz = thickness * v * roundingFactor; // Z sigue una curva esférica respecto al borde

                // Aplicar escala a unidades de pantalla
                tx *= scale;
                ty *= scale;
                tz *= scale;

                // 3. Posiciones de inicio (Dispersión aleatoria)
                const sx = (Math.random() - 0.5) * canvas.width * 2.5;
                const sy = (Math.random() - 0.5) * canvas.height * 2.5;
                const sz = (Math.random() - 0.5) * 1000;

                // 4. Asignar mensaje y cache
                const selectedPhrase = i % 2 === 0 ? "Te amo Carolina" : "Te quiero mucho Geo";
                const validCaches = textCaches.filter(c => c.phrase === selectedPhrase);
                const myCache = validCaches[Math.floor(Math.random() * validCaches.length)];

                // 5. Tamaño de partícula (ligeramente ajustado para móvil)
                let szMod = 0.3 + Math.random() * 0.25;
                if (canvas.width < 600) szMod *= 0.85; // Un poco más pequeñas en móvil

                particles.push({
                    sx, sy, sz, // Start
                    tx, ty, tz, // Target (Heart)
                    cache: myCache,
                    sizeModifier: szMod
                });
            }
        }

        // Inicializar por primera vez
        resizeCanvas();
        initHeartPoints();

        // --- CONTROLES DE INTERACCIÓN ---
        function startDrag(x, y) { 
            isDragging = true; 
            previousX = x; 
            previousY = y; 
            // Ocultar instrucciones al primer toque
            document.getElementById('instrucciones').style.display = 'none';
        }
        function moveDrag(x, y) {
            if (!isDragging) return;
            // Sensibilidad ajustada para móvil/desktop
            const sensitivity = 0.006;
            targetAngleY += (x - previousX) * sensitivity;
            targetAngleX += (y - previousY) * sensitivity;
            previousX = x; previousY = y;
        }
        function endDrag() { isDragging = false; }

        window.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', (e) => moveDrag(e.touches[0].clientX, e.touches[0].clientY), { passive: false }); // Prevenir scroll nativo
        window.addEventListener('touchend', endDrag);
        window.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', endDrag);

        // --- LOOP DE ANIMACIÓN ---
        function animate() {
            // Limpiar pantalla con un negro puro
            ctx.fillStyle = '#010001';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Progresión del morphing inicial
            if (morphProgress < 1) morphProgress += morphSpeed;
            // Rotación automática lenta si no se está arrastrando
            if (!isDragging) targetAngleY += 0.0015; 

            // Suavizado de la rotación (lerp)
            angleX += (targetAngleX - angleX) * 0.06;
            angleY += (targetAngleY - angleY) * 0.06;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const perspective = 700; // Aumentado para un 3D más natural

            // Opciones de estilo globales (para que las partículas se sumen)
            ctx.globalCompositeOperation = 'lighter'; // Efecto aditivo (glow se intensifica)

            for (let i = 0; i < totalParticles; i++) {
                const p = particles[i];

                // Interpolación lineal entre dispersión y forma de corazón
                const cx = p.sx + (p.tx - p.sx) * morphProgress;
                const cy = p.sy + (p.ty - p.sy) * morphProgress;
                const cz = p.sz + (p.tz - p.sz) * morphProgress;

                // ROTACIÓN 3D
                // Rotar en Y
                let x1 = cx * Math.cos(angleY) - cz * Math.sin(angleY);
                let z1 = cx * Math.sin(angleY) + cz * Math.cos(angleY);

                // Rotar en X
                let y2 = cy * Math.cos(angleX) - z1 * Math.sin(angleX);
                let z2 = cy * Math.sin(angleX) + z1 * Math.cos(angleX);

                // Proyección 2D si está frente a la cámara
                if (z2 < -perspective) continue;

                const pScale = perspective / (perspective + z2);
                const screenX = centerX + x1 * pScale;
                const screenY = centerY + y2 * pScale;

                // Escala final del texto (tamaño base * perspectiva * modificador random)
                const finalScale = p.sizeModifier * pScale;
                const w = p.cache.width * finalScale;
                const h = p.cache.height * finalScale;

                // Profundidad de campo (transparencia basada en Z)
                // Las partículas muy lejanas se desvanecen
                ctx.globalAlpha = Math.min(1, Math.max(0.05, (perspective - z2 / 1.5) / (perspective * 1.5)));
                
                // Dibujar el canvas pre-renderizado (con el glow neón)
                ctx.drawImage(p.cache.canvas, screenX - w / 2, screenY - h / 2, w, h);
            }

            // Restaurar configuración estándar para siguientes elementos
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'source-over';
            
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
